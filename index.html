<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nore Store | متجر النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff0050;
            --secondary-color: #00f2ea;
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.3);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary-color);
        }

        h2 {
            color: var(--secondary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 1.1em;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-links a {
            color: white;
            font-size: 2em;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--secondary-color);
        }

        .tiktok-icon {
            width: 40px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<header>
    <h1>Nore Store <i class="fas fa-shopping-cart"></i></h1>
    <p>مرحباً بك في متجر النور - وجهتك للخدمات الرقمية</p>
</header>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-bullhorn"></i> بوابة المعلنين</h2>
        <p>اطلب خدمة الإعلان أو تواصل معنا عبر النموذج التالي:</p>
        
        <form action="https://formspree.io/f/xdabranz" method="POST">
            <div class="form-group">
                <label>الاسم الكامل:</label>
                <input type="text" name="name" required placeholder="ادخل اسمك هنا">
            </div>
            
            <div class="form-group">
                <label>نوع الخدمة:</label>
                <select name="service">
                    <option value="tiktok">شحن عملات تيك توك</option>
                    <option value="ads">إعلانات تجارية</option>
                    <option value="cars">خدمات سيارات</option>
                    <option value="realestate">عقارات</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>تفاصيل الطلب:</label>
                <textarea name="message" rows="4" required placeholder="اكتب تفاصيل طلبك هنا..."></textarea>
            </div>
            
            <button type="submit">تأكيد وإرسال الطلب</button>
        </form>
    </div>

    <div class="social-links">
        <a href="https://www.tiktok.com/@norestore" target="_blank">
            <img src="https://cdn.pixabay.com/photo/2021/01/30/06/42/tiktok-5962992_1280.png" class="tiktok-icon" alt="TikTok">
        </a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
    </div>
</div>

</body>
</html>

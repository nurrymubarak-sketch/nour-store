<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nore Store | منصة الإعلانات المباشرة</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #D4AF37, #F9F295, #B8860B);
            --dark-bg: #0d1117;
            --card-gray: #161b22;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--dark-bg); color: #fff; text-align: center; }
        header { background: linear-gradient(to bottom, #16213e, #0f3460); padding: 20px 0; border-bottom: 3px solid #D4AF37; }
        
        .logo-box { border: 2px solid #D4AF37; display: inline-block; padding: 10px 25px; border-radius: 15px; background: #000; }
        .logo-n { font-size: 50px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: serif; margin: 0; line-height: 1; }
        
        .hero-text { margin: 20px auto; width: 90%; }
        .hero-text h2 { color: #D4AF37; font-size: 20px; margin-bottom: 5px; }

        .container { width: 92%; margin: auto; padding-bottom: 100px; }
        
        /* تصميم البطاقة */
        .card { background: var(--card-gray); border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.3); text-align: right; }
        .card-head { padding: 12px 15px; font-weight: bold; background: #333; font-size: 14px; color: #fff; }
        
        .card-inner { padding: 15px; display: flex; gap: 12px; align-items: center; }
        .card-img-box { width: 110px; height: 90px; border-radius: 12px; border: 1.5px solid #D4AF37; overflow: hidden; flex-shrink: 0; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-side { flex: 1; }
        .info-side h3 { margin: 0; color: #D4AF37; font-size: 16px; }
        .price-tag { color: #2ecc71; font-weight: bold; font-size: 13px; display: block; margin-top: 5px; }

        .btn-wa { background: var(--gold); color: #000; border: none; padding: 10px; border-radius: 12px; font-weight: bold; font-size: 13px; cursor: pointer; text-align: center; text-decoration: none; display: block; margin-top: 10px; }

        /* زر الإضافة العائم */
        .add-fab { position: fixed; bottom: 25px; left: 25px; width: 65px; height: 65px; background: var(--gold); border-radius: 50%; font-size: 35px; color: #000; border: none; cursor: pointer; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* نافذة إضافة إعلان */
        .modal { display: none; position: fixed; inset: 0; background: #0d1117; z-index: 9999; padding: 20px; overflow-y: auto; text-align: right; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        label { display: block; margin-top: 15px; color: #D4AF37; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1 class="logo-n">N</h1>
        <div style="color:#D4AF37; font-weight:bold;">Nore Store</div>
    </div>
</header>

<div class="hero-text">
    <h2>تواصل مع المعلن مباشرة 🤝</h2>
</div>

<div class="container" id="adsContainer">
    </div>

<button class="add-fab" onclick="document.getElementById('addModal').style.display='block'">+</button>

<div id="addModal" class="modal">
    <h2 style="color:#D4AF37; text-align:center;">انشر إعلانك الآن 🚀</h2>
    
    <label>القسم</label>
    <select id="p-cat">
        <option value="🚗 سيارات مستعملة">🚗 سيارات مستعملة</option>
        <option value="🏠 عقارات (إيجار)">🏠 عقارات (إيجار)</option>
        <option value="🛠️ صيانة ونظافة">🛠️ صيانة ونظافة</option>
        <option value="📱 جوالات وإلكترونيات">📱 جوالات وإلكترونيات</option>
        <option value="🛋️ أثاث مستعمل">🛋️ أثاث مستعمل</option>
        <option value="💼 وظائف وطلبات">💼 وظائف وطلبات</option>
    </select>

    <label>عنوان الإعلان</label>
    <input type="text" id="p-title" placeholder="مثال: تويوتا كورولا 2015">
    
    <label>السعر</label>
    <input type="text" id="p-price" placeholder="السعر أو اكتب (اتصل)">
    
    <label>رقم واتساب المعلن (بدون أصفار)</label>
    <input type="tel" id="p-wa" placeholder="مثال: 9665XXXXXXXX">
    
    <label>صورة المنتج</label>
    <input type="file" id="p-img" accept="image/*">

    <button class="btn-wa" style="width:100%; margin-top:30px; padding:20px;" onclick="publishAd()">نشر الإعلان فوراً</button>
    <button onclick="document.getElementById('addModal').style.display='none'" style="background:none; border:none; color:#666; width:100%; margin-top:15px;">إلغاء</button>
</div>

<script>
    function publishAd() {
        const title = document.getElementById('p-title').value;
        const price = document.getElementById('p-price').value;
        const cat = document.getElementById('p-cat').value;
        const wa = document.getElementById('p-wa').value;
        const file = document.getElementById('p-img').files[0];

        if(title && wa && file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                let ads = JSON.parse(localStorage.getItem('nore_direct_ads')) || [];
                ads.unshift({title, price, cat, wa, img: e.target.result});
                localStorage.setItem('nore_direct_ads', JSON.stringify(ads));
                location.reload();
            };
            reader.readAsDataURL(file);
        } else { alert("يا SoOo، لازم تعبي كل البيانات وتختار صورة!"); }
    }

    window.onload = function() {
        const container = document.getElementById('adsContainer');
        const ads = JSON.parse(localStorage.getItem('nore_direct_ads')) || [];
        
        if(ads.length === 0) {
            container.innerHTML = '<p style="color:#666; margin-top:50px;">لا توجد إعلانات حالياً.. كن أول من يعلن!</p>';
        }

        ads.forEach(ad => {
            container.innerHTML += `
                <div class="card">
                    <div class="card-head">${ad.cat}</div>
                    <div class="card-inner">
                        <div class="card-img-box"><img src="${ad.img}"></div>
                        <div class="info-side">
                            <h3>${ad.title}</h3>
                            <span class="price-tag">${ad.price}</span>
                            <a href="https://wa.me/${ad.wa}?text=بخصوص_إعلانك_في_NoreStore" class="btn-wa">تواصل مع صاحب الإعلان</a>
                        </div>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>

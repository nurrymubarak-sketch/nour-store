<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noure Store | Advertiser Portal</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #D4AF37, #F9F295, #B8860B);
            --dark-bg: #0d1117;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background: var(--dark-bg); color: #fff; text-align: right;
            padding-bottom: 50px;
        }
        header {
            background: linear-gradient(to bottom, #16213e, #0f3460);
            padding: 20px; text-align: center; border-bottom: 3px solid #D4AF37;
        }
        .container { width: 90%; margin: auto; padding-top: 20px; }
        
        h2 { color: #D4AF37; text-align: center; margin-bottom: 25px; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #D4AF37; font-size: 14px; }
        
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px;
            border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box;
        }

        .file-upload {
            border: 2px dashed #D4AF37; padding: 20px; text-align: center;
            border-radius: 10px; margin-top: 10px; background: rgba(212, 175, 55, 0.05);
        }

        .btn-gold {
            background: var(--gold); color: #000; border: none;
            padding: 15px; border-radius: 30px; font-weight: bold;
            width: 100%; margin-top: 30px; cursor: pointer; font-size: 16px;
        }

        .home-footer {
            margin-top: 40px; text-align: center; border-top: 1px solid #333; padding-top: 20px;
        }
        .btn-outline {
            color: #D4AF37; text-decoration: none; border: 1px solid #D4AF37;
            padding: 10px 25px; border-radius: 20px; display: inline-block;
        }

        .note { font-size: 11px; color: #aaa; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div style="border: 2px solid #D4AF37; display: inline-block; padding: 5px 20px; border-radius: 10px;">
        <h1 style="margin:0; font-family: serif; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">N</h1>
    </div>
    <div style="color:#D4AF37; font-weight:bold;">Noure store</div>
</header>

<div class="container">
    <h2>بوابة المعلنين الجديدة 🔑</h2>

    <form id="adForm">
        <label>اسم المتجر / الشخص المعلن</label>
        <input type="text" placeholder="أدخل اسمك أو اسم النشاط" required>

        <label>قسم المنتج</label>
        <select>
            <option>عقارات</option>
            <option>سيارات</option>
            <option>إلكترونيات</option>
        </select>

        <label>وصف المنتج / الإعلان</label>
        <textarea rows="4" placeholder="اكتب تفاصيل المنتج كاملة هنا..."></textarea>

        <label>السعر (بالعملة المحلية)</label>
        <input type="number" placeholder="مثال: 5000">

        <label>وسيلة التواصل المفضلة</label>
        <select id="contactMethod">
            <option value="whatsapp">واتساب (WhatsApp)</option>
            <option value="email">بريد إلكتروني (E-mail)</option>
        </select>

        <label>رقم التواصل أو البريد</label>
        <input type="text" placeholder="أدخل الرقم أو الإيميل">

        <label>رفع صور المنتج (يمكن اختيار أكثر من صورة)</label>
        <div class="file-upload">
            <input type="file" accept="image/*" multiple style="border:none; background:none;">
            <p style="font-size: 12px; color: #D4AF37;">اسحب الصور هنا أو اضغط للاختيار</p>
        </div>

        <label>رفع فيديو للمنتج (اختياري)</label>
        <div class="file-upload">
            <input type="file" accept="video/*" style="border:none; background:none;">
        </div>

        <button type="button" class="btn-gold" onclick="submitAd()">إرسال الطلب والتوثيق</button>
        <p class="note">* سيتم إرسال بريد إلكتروني لتأكيد التسجيل فور مراجعة طلبك من قبل الإدارة.</p>
    </form>

    <div class="home-footer">
        <a href="index.html" class="btn-outline">🏠 الرجوع للصفحة الرئيسية</a>
    </div>
</div>

<script>
    function submitAd() {
        alert("تم استلام طلبك بنجاح! سيصلك إيميل تأكيد على بريدك المسجل فور مراجعة الصور والبيانات.");
        // هنا يمكن ربط الكود بـ API لإرسال الإيميل الحقيقي
    }
</script>

</body>
</html>

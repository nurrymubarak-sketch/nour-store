<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nour Real Estate | نُور العقارية</title>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: var(--dark); text-align: center; }
        header { background: var(--dark); color: var(--gold); padding: 20px; font-weight: bold; border-bottom: 4px solid var(--gold); font-size: 1.4em; }
        .container { padding: 15px; max-width: 480px; margin: auto; }
        .card { background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #eee; }
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        textarea { height: 100px; resize: none; }
        button { background: var(--dark); color: var(--gold); font-weight: bold; border: 1px solid var(--gold); cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--gold); color: var(--dark); }
        .prop-item { background: white; border-radius: 15px; overflow: hidden; margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: right; }
        video, img { width: 100%; height: 230px; object-fit: cover; background: #000; }
        .details { padding: 15px; }
        .price { color: #27ae60; font-size: 1.3em; font-weight: bold; }
        .desc-box { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 0.9em; color: #555; margin: 10px 0; border-right: 4px solid var(--gold); }
    </style>
</head>
<body>

<header>نُور العقارية | NOUR REAL ESTATE 🏙️</header>

<div class="container">
    <div class="card">
        <h3 style="color:var(--gold); margin-top:0;">إضافة عرض عقاري جديد 💎</h3>
        <input type="text" id="pTitle" placeholder="اسم المشروع أو الشقة">
        <textarea id="pDesc" placeholder="اكتب وصفاً كاملاً (مثلاً: 3 غرف، طابق 10، إطلالة بحرية، مسبح خاص...)"></textarea>
        <input type="text" id="pImg" placeholder="رابط صورة العقار الرئيسية">
        <input type="text" id="pVid" placeholder="رابط فيديو العقار (رابط مباشر)">
        <input type="number" id="pPrice" placeholder="السعر المطلوب (AED)">
        <button onclick="saveToCloud()">نشر العقار بالوصف والفيديو ✅</button>
    </div>

    <div id="displayList">جاري تحميل أحدث العروض...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ff0ku07M5FT8O4PVxBL0fkb70h8OaFY",
        authDomain: "nour-store-platform.firebaseapp.com",
        projectId: "nour-store-platform",
        storageBucket: "nour-store-platform.appspot.com",
        messagingSenderId: "1058922024981",
        appId: "1:1058922024981:web:8317653906d138ec8bfe1c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // حفظ البيانات في Firestore (يعمل مجاناً 100%)
    async function saveToCloud() {
        const title = document.getElementById('pTitle').value;
        const desc = document.getElementById('pDesc').value;
        const img = document.getElementById('pImg').value;
        const vid = document.getElementById('pVid').value;
        const price = document.getElementById('pPrice').value;

        if(title && price && desc) {
            await db.collection("premium_listings").add({
                title, desc, img, vid, price,
                createdAt: Date.now()
            });
            alert("تم نشر عرضك الاحترافي بنجاح! 🚀");
            location.reload();
        } else {
            alert("يرجى ملء العنوان والوصف والسعر على الأقل");
        }
    }

    // عرض العقارات بشكل تلقائي وفوري
    db.collection("premium_listings").orderBy("createdAt", "desc").onSnapshot(snap => {
        let html = "";
        snap.forEach(doc => {
            const p = doc.data();
            html += `
                <div class="prop-item">
                    <img src="${p.img || 'https://via.placeholder.com/400x230?text=NO+IMAGE'}">
                    ${p.vid ? `<video controls src="${p.vid}"></video>` : ''}
                    <div class="details">
                        <h3 style="margin:0; color:var(--dark);">${p.title}</h3>
                        <div class="desc-box">${p.desc}</div>
                        <div class="price">${Number(p.price).toLocaleString()} AED</div>
                        <a href="https://wa.me/971500000000" style="display:block; background:#25d366; color:white; padding:10px; margin-top:10px; text-decoration:none; border-radius:8px; font-weight:bold; text-align:center;">تواصل للحجز ✅</a>
                    </div>
                </div>`;
        });
        document.getElementById('displayList').innerHTML = html || "لا توجد عقارات حالياً";
    });
</script>
</body>
</html>

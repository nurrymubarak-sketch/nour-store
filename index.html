<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nore Store | متجر نوري</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --gold: #D4AF37; --dark-bg: #020617; --card-bg: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark-bg); color: #fff; text-align: center; }
        header { background: linear-gradient(to bottom, #16213e, #020617); padding: 30px; border-bottom: 3px solid var(--gold); }
        .logo-box { border: 2.5px solid var(--gold); display: inline-block; padding: 10px 30px; border-radius: 20px; background: #000; }
        .logo-n { font-size: 60px; color: var(--gold); font-family: serif; margin: 0; }
        
        .container { width: 95%; max-width: 600px; margin: 20px auto; padding-bottom: 100px; }
        .card { background: var(--card-bg); border-radius: 25px; margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.2); text-align: right; }
        .card-header { padding: 12px 20px; font-weight: bold; font-size: 17px; color: #fff; }
        
        .btn-action { background: var(--gold); color: #000; padding: 12px 30px; border-radius: 25px; font-weight: bold; border: none; cursor: pointer; margin: 15px; font-size: 16px; }

        /* تعديل: جعل عرض الصور كبيراً كما في الفيديو */
        .ads-feed { background: #0f172a; }
        .ad-item { padding: 0; border-bottom: 5px solid #020617; background: #1e293b; margin-bottom: 15px; border-radius: 20px; overflow: hidden; }
        .ad-item img { width: 100%; height: 250px; object-fit: cover; border-bottom: 2px solid var(--gold); }
        .ad-info { padding: 15px; text-align: right; }
        .ad-info b { color: var(--gold); font-size: 20px; display: block; margin-bottom: 5px; }
        .ad-info small { color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px; }
        .ad-info p { margin: 0; font-size: 15px; color: #cbd5e1; line-height: 1.6; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 25px; border: 2px solid var(--gold); max-width: 450px; margin: auto; text-align: right; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; background: #020617; border: 1px solid #334155; color: #fff; box-sizing: border-box; }
        label { color: var(--gold); font-weight: bold; font-size: 13px; }
        .file-input-label { background: #334155; color: white; padding: 10px; display: block; text-align: center; border-radius: 10px; cursor: pointer; border: 1px dashed var(--gold); }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1 class="logo-n">N</h1>
        <div style="color:var(--gold); font-weight:bold;">Nore Store</div>
    </div>
</header>

<div class="container">
    <div class="card"><div class="card-header" style="background: #064e3b;">🏎️ سيارات للبيع</div><button class="btn-action" onclick="openPost('cars')">اضف إعلانك مجاناً</button><div id="list-cars" class="ads-feed"></div></div>
    <div class="card"><div class="card-header" style="background: #1e3a8a;">🏠 عقارات (إيجار/بيع)</div><button class="btn-action" onclick="openPost('house')">اضف إعلانك مجاناً</button><div id="list-house" class="ads-feed"></div></div>
    <div class="card"><div class="card-header" style="background: #581c87;">📱 جوالات وإلكترونيات</div><button class="btn-action" onclick="openPost('tech')">اضف إعلانك مجاناً</button><div id="list-tech" class="ads-feed"></div></div>
    <div class="card"><div class="card-header" style="background: #431407;">🛠️ صيانة ونظافة</div><button class="btn-action" onclick="openPost('fix')">اضف إعلانك مجاناً</button><div id="list-fix" class="ads-feed"></div></div>
    <div class="card"><div class="card-header" style="background: #065f46;">💼 وظائف شاغرة</div><button class="btn-action" onclick="openPost('jobs')">اضف إعلانك مجاناً</button><div id="list-jobs" class="ads-feed"></div></div>
    <div class="card"><div class="card-header" style="background: #374151;">✨ منوعات وأخرى</div><button class="btn-action" onclick="openPost('other')">اضف إعلانك مجاناً</button><div id="list-other" class="ads-feed"></div></div>
</div>

<div id="postModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--gold); text-align:center;">إضافة منتج جديد 📸</h3>
        <input type="hidden" id="activeCat">
        
        <label>اسم المنتج</label>
        <input type="text" id="pName" placeholder="مثلاً: آيفون 15 برو ماكس">
        
        <label>وصف المنتج</label>
        <textarea id="pDesc" rows="3" placeholder="اكتب المواصفات والسعر..."></textarea>
        
        <label>رفع صورة المنتج</label>
        <label for="pImgFile" class="file-input-label">اضغط هنا لاختيار صورة من جهازك</label>
        <input type="file" id="pImgFile" accept="image/*" style="display:none" onchange="handleFile(this)">
        <p id="fileStatus" style="font-size:11px; color:var(--gold); text-align:center;"></p>
        
        <label>البريد الإلكتروني</label>
        <input type="email" id="pEmail" placeholder="mail@example.com">
        
        <label>رقم الهاتف (واتساب)</label>
        <input type="tel" id="pPhone" placeholder="09xxxxxxx">
        
        <button id="saveBtn" class="btn-action" style="width:100%; margin:10px 0;" onclick="saveAd()">حفظ ونشر الآن ✅</button>
        <button onclick="document.getElementById('postModal').style.display='none'" style="width:100%; background:none; color:grey; border:none;">إلغاء</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyC-MoihmZLENUbWi1oo0aODvsbPvWVEN-U",
      authDomain: "norestore-efa4e.firebaseapp.com",
      projectId: "norestore-efa4e",
      databaseURL: "https://norestore-efa4e-default-rtdb.firebaseio.com",
      appId: "1:501643206128:web:b26650c9f9324fb9d35135"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let imageData = ""; 

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            document.getElementById('fileStatus').innerText = "جاري تجهيز الصورة...";
            const reader = new FileReader();
            reader.onload = function(e) {
                imageData = e.target.result;
                document.getElementById('fileStatus').innerText = "تم اختيار الصورة بنجاح ✅";
            };
            reader.readAsDataURL(file);
        }
    }

    function openPost(cat) {
        document.getElementById('activeCat').value = cat;
        document.getElementById('postModal').style.display = 'block';
        imageData = ""; 
        document.getElementById('fileStatus').innerText = "";
    }

    function saveAd() {
        const cat = document.getElementById('activeCat').value;
        const name = document.getElementById('pName').value;
        const desc = document.getElementById('pDesc').value;
        const email = document.getElementById('pEmail').value;
        const phone = document.getElementById('pPhone').value;

        if (name && desc && phone && imageData) {
            document.getElementById('saveBtn').innerText = "جاري النشر...";
            db.ref('ads/' + cat).push({
                productName: name,
                productDesc: desc,
                productImg: imageData,
                userEmail: email,
                userPhone: phone,
                time: Date.now()
            }).then(() => {
                alert('تم نشر إعلانك بنجاح!');
                location.reload(); 
            });
        } else {
            alert('يرجى ملء كافة الخانات واختيار صورة');
        }
    }

    const cats = ['cars', 'house', 'tech', 'fix', 'jobs', 'other'];
    cats.forEach(cat => {
        db.ref('ads/' + cat).on('value', (snap) => {
            const container = document.getElementById('list-' + cat);
            container.innerHTML = "";
            snap.forEach(child => {
                const ad = child.val();
                container.innerHTML += `
                    <div class="ad-item">
                        <img src="${ad.productImg}">
                        <div class="ad-info">
                            <b>${ad.productName}</b>
                            <small>📞 تواصل: ${ad.userPhone} ${ad.userEmail ? ' | ✉️ ' + ad.userEmail : ''}</small>
                            <p>${ad.productDesc}</p>
                        </div>
                    </div>`;
            });
        });
    });
</script>
</body>
</html>

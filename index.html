<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nore Store | متجر نوري</title>
    <style>
        /* التنسيق الأصلي اللي طلبته */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0b0e14; color: #fff; text-align: center; }
        header { background: #0b0e14; padding: 25px; border-bottom: 2px solid #D4AF37; }
        .logo { font-size: 30px; font-weight: bold; color: #D4AF37; }

        /* ميزة البحث (هادئة جداً) */
        .search-area { padding: 15px; }
        #search { width: 90%; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #1a1a1a; color: #fff; }

        .container { width: 95%; margin: auto; padding-bottom: 80px; }

        /* البطاقات العمودية (نفس تصميمك الأول) */
        .card { background: #161b22; border-radius: 10px; margin-bottom: 20px; border: 1px solid #222; text-align: right; overflow: hidden; }
        .card img { width: 100%; height: auto; display: block; border-bottom: 1px solid #222; }
        .card-info { padding: 15px; }
        .card-title { font-size: 22px; color: #D4AF37; margin: 0; }
        .price { color: #2ecc71; font-weight: bold; font-size: 18px; display: block; margin: 10px 0; }
        .desc { font-size: 14px; color: #ccc; line-height: 1.5; }

        /* الأزرار */
        .btn-wa { background: #D4AF37; color: #000; border: none; padding: 15px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; text-decoration: none; display: block; margin-top: 15px; text-align: center; }
        
        .add-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #D4AF37; border-radius: 50%; font-size: 30px; color: #000; border: none; cursor: pointer; z-index: 1000; }

        /* مودال الإضافة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; overflow-y: auto; text-align: right; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

<header><div class="logo">NORE STORE</div></header>

<div class="search-area">
    <input type="text" id="search" placeholder="بحث عن إعلان..." onkeyup="doSearch()">
</div>

<div class="container" id="adsList">
    <div class="card ad-box">
        <img src="https://cdn.pixabay.com/photo/2021/01/30/06/42/tiktok-5962992_1280.png">
        <div class="card-info">
            <h3 class="card-title">شحن تيك توك فوري</h3>
            <span class="price">سعر منافس</span>
            <p class="desc">شحن رسمي برقم الآيدي، استلام خلال دقائق.</p>
            <a href="https://wa.me/971551505027" class="btn-wa">تواصل واتساب</a>
        </div>
    </div>
</div>

<button class="add-btn" onclick="document.getElementById('postModal').style.display='block'">+</button>

<div id="postModal" class="modal">
    <h2 style="color:#D4AF37; text-align:center;">إضافة إعلان جديد</h2>
    <input type="text" id="t-title" placeholder="عنوان الإعلان">
    <input type="text" id="t-price" placeholder="السعر">
    <input type="file" id="t-img" accept="image/*">
    <input type="text" id="t-wa" placeholder="رقم الواتساب">
    <textarea id="t-desc" rows="4" placeholder="وصف المنتج..."></textarea>
    <button class="btn-wa" style="margin-top:20px;" onclick="saveAd()">نشر الآن</button>
    <p style="text-align:center; color:#888;" onclick="this.parentElement.style.display='none'">إلغاء</p>
</div>

<script>
    function doSearch() {
        let val = document.getElementById('search').value.toLowerCase();
        let ads = document.querySelectorAll('.ad-box');
        ads.forEach(ad => {
            ad.style.display = ad.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    function saveAd() {
        const title = document.getElementById('t-title').value;
        const price = document.getElementById('t-price').value;
        const wa = document.getElementById('t-wa').value;
        const desc = document.getElementById('t-desc').value;
        const file = document.getElementById('t-img').files[0];

        if(title && wa && file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                let ads = JSON.parse(localStorage.getItem('nore_ads_fixed')) || [];
                ads.unshift({title, price, wa, desc, img: e.target.result});
                localStorage.setItem('nore_ads_fixed', JSON.stringify(ads));
                location.reload();
            };
            reader.readAsDataURL(file);
        } else { alert("يا SoOo، كمل البيانات!"); }
    }

    window.onload = function() {
        const list = document.getElementById('adsList');
        const ads = JSON.parse(localStorage.getItem('nore_ads_fixed')) || [];
        ads.forEach(ad => {
            list.innerHTML += `
                <div class="card ad-box">
                    <img src="${ad.img}">
                    <div class="card-info">
                        <h3 class="card-title">${ad.title}</h3>
                        <span class="price">${ad.price}</span>
                        <p class="desc">${ad.desc}</p>
                        <a href="https://wa.me/${ad.wa}" class="btn-wa">تواصل واتساب</a>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>

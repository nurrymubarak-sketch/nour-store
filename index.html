<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noure Store | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0; background: #0f1014; font-family: 'Segoe UI', Arial, sans-serif; color: white;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 95%; max-width: 500px; padding: 20px; }
        
        header { text-align: center; padding: 30px; background: linear-gradient(45deg, #ff0050, #00f2ea); border-radius: 0 0 30px 30px; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        /* قسم الأسعار الخاص بك */
        .price-card { background: #1a1a1a; border-radius: 20px; padding: 20px; border: 1px solid #ff0050; margin-top: 20px; }
        .price-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }

        /* قسم الإعلانات التي ستظهر تلقائياً */
        #ads-container { margin-top: 30px; width: 100%; }
        .ad-card { background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #d4af37; animation: fadeIn 0.5s; }
        .ad-card img { width: 100%; height: 200px; object-fit: cover; }
        .ad-content { padding: 15px; text-align: center; }

        /* زر إضافة إعلان (للمعلنين) */
        .add-ad-btn { background: #d4af37; color: black; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 20px 0; display: inline-block; }

        /* نافذة الرفع */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 25px; width: 85%; border: 1px solid #d4af37; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>NOURE STORE</h1>
    <p>شحن تيك توك حصري وإعلانات مباشرة</p>
</header>

<div class="container">
    <div class="price-card">
        <h3 style="color: #00f2ea; text-align: center;">💎 أسعار الشحن الخاصة بي</h3>
        <div class="price-item"><span>1000 عملة</span> <span>70 AED</span></div>
        <div class="price-item"><span>5000 عملة</span> <span>340 AED</span></div>
        <button style="width:100%; padding:15px; border-radius:15px; border:none; background:#25d366; color:white; font-weight:bold; margin-top:10px;" onclick="location.href='https://wa.me/971551505027'">اطلب عبر واتساب</button>
    </div>

    <center><div class="add-ad-btn" onclick="openModal()">📢 أنشئ إعلانك ويظهر طوالى</div></center>

    <div id="ads-container">
        <h3 style="text-align: center; color: #d4af37;">🌟 إعلانات شركائنا</h3>
        </div>
</div>

<div id="adModal" class="modal">
    <div class="modal-content">
        <h2 style="color:#d4af37; text-align:center;">رفع إعلان جديد</h2>
        <input type="text" id="adTitle" placeholder="عنوان الإعلان">
        <input type="text" id="adImg" placeholder="رابط صورة الإعلان (URL)">
        <textarea id="adDesc" placeholder="وصف قصير للاعلان..."></textarea>
        <button onclick="postAd()" style="width:100%; padding:15px; background:#d4af37; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">نشر الإعلان الآن</button>
        <p onclick="closeModal()" style="text-align:center; color:#888; cursor:pointer; margin-top:15px;">إلغاء</p>
    </div>
</div>

<script>
    function openModal() { document.getElementById("adModal").style.display = "flex"; }
    function closeModal() { document.getElementById("adModal").style.display = "none"; }

    // دالة نشر الإعلان
    function postAd() {
        const title = document.getElementById('adTitle').value;
        const img = document.getElementById('adImg').value;
        const desc = document.getElementById('adDesc').value;

        if(title && img && desc) {
            const adData = { title, img, desc };
            let ads = JSON.parse(localStorage.getItem('myAds')) || [];
            ads.push(adData);
            localStorage.setItem('myAds', JSON.stringify(ads));
            
            renderAds();
            closeModal();
            alert("تم نشر إعلانك بنجاح!");
        } else {
            alert("الرجاء ملء كل الخانات");
        }
    }

    // دالة عرض الإعلانات من الذاكرة
    function renderAds() {
        const container = document.getElementById('ads-container');
        const ads = JSON.parse(localStorage.getItem('myAds')) || [];
        
        // مسح الحاوية ثم إعادة البناء
        container.innerHTML = '<h3 style="text-align: center; color: #d4af37;">🌟 إعلانات شركائنا</h3>';
        
        ads.forEach(ad => {
            container.innerHTML += `
                <div class="ad-card">
                    <img src="${ad.img}" alt="Ad">
                    <div class="ad-content">
                        <h3>${ad.title}</h3>
                        <p>${ad.desc}</p>
                    </div>
                </div>
            `;
        });
    }

    // عرض الإعلانات عند فتح الصفحة
    window.onload = renderAds;
</script>

</body>
</html>

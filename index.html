<script>
    // الدوال المسؤولة عن تسجيل العميل وفتح الاستمارة تلقائياً
    function handleReg() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const btn = document.querySelector('.btn-fast-reg');

        if(!email || !pass || !name) {
            alert("يا SoOo، العميل لازم يملأ الاسم والإيميل وكلمة السر (6 خانات) عشان الاستمارة تفتح!");
            return;
        }

        btn.innerText = "جاري فتح الاستمارة... ⏳";
        btn.disabled = true;

        // تنفيذ التسجيل باستخدام البيانات الموجودة مسبقاً
        auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            // تحديث اسم العميل
            userCredential.user.updateProfile({ displayName: name });
            
            // النجاح: إخفاء منطقة التسجيل وإظهار استمارة الإعلان فوراً
            document.getElementById('regArea').style.display = 'none'; 
            document.getElementById('postView').style.display = 'block'; 
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            alert("مرحباً بك يا " + name + ".. الآن يمكنك إضافة إعلانك!");
        })
        .catch((error) => {
            btn.innerText = "▶ إنشاء حساب مجاناً";
            btn.disabled = false;
            // توضيح سبب الرفض للعميل (كلمة سر قصيرة أو إيميل مستخدم)
            if (error.code === 'auth/weak-password') alert("كلمة السر ضعيفة (لازم 6 خانات)");
            else alert("عذراً: " + error.message);
        });
    }

    // دالة التنقل بين الأقسام
    function nav(section) {
        if(section === 'post' && !auth.currentUser) {
            document.getElementById('regArea').scrollIntoView({ behavior: 'smooth' });
            alert("سجل حسابك أولاً لتتمكن من النشر!");
            return;
        }
        // إظهار وإخفاء الواجهات بناءً على الاختيار
        document.getElementById('mainContent').style.display = (section === 'home') ? 'block' : 'none';
        document.getElementById('postView').style.display = (section === 'post') ? 'block' : 'none';
        document.getElementById('myAdsView').style.display = (section === 'my') ? 'block' : 'none';
    }
</script>

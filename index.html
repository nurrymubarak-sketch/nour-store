<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noure Store | المتجر المتكامل</title>
    <style>
        :root { 
            --gold: #D4AF37; --dark-navy: #0d1726; --bg-green: #407b6e; 
            --bg-orange: #f48a73; --card-dark: #122338; --tiktok: linear-gradient(45deg, #000, #ff0050, #00f2ea);
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; color: #1e293b; overflow-x: hidden; }
        
        header { background: var(--dark-navy); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); }
        
        /* منطقة البانر واللوقو (بدون عملات) */
        .hero-banner { width: 100%; padding: 60px 0; background: linear-gradient(to bottom, var(--bg-green) 50%, var(--bg-orange) 50%); display: flex; flex-direction: column; align-items: center; }
        .logo-circle { width: 150px; height: 150px; background: white; border-radius: 50%; border: 4px solid var(--bg-green); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); position: relative; }
        .logo-circle h1 { color: var(--bg-green); margin: 0; font-size: 50px; }

        /* أيقونة تيك توك مدمجة في التصميم */
        .tiktok-badge { position: absolute; bottom: -10px; right: -10px; background: #000; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 92%; margin: 20px auto; }
        .main-card { border-radius: 15px; padding: 15px 5px; color: white; text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; border: none; }
        .main-card:active { transform: scale(0.95); }
        
        .btn-tiktok { background: var(--tiktok); }
        .btn-orange { background: var(--bg-orange); }
        .btn-green { background: #2d4c3b; }
        .btn-navy { background: var(--card-dark); }
        .btn-gold { background: var(--gold); color: #000; }

        .page-content { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; padding: 25px; overflow-y: auto; text-align: right; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .p-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .p-img { width: 100%; height: 120px; object-fit: cover; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; background: #f9f9f9; }
        .btn-action { background: var(--dark-navy); color: var(--gold); padding: 15px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div onclick="location.reload()">☰</div>
    <div style="font-weight:bold; color:var(--gold);">Noure Store</div>
    <div>🌙</div>
</header>

<div id="homeUI">
    <div class="hero-banner">
        <div class="logo-circle">
            <h1>N</h1>
            <div style="font-weight:bold; color:#333; font-size: 14px;">Noure Store</div>
            <div class="tiktok-badge">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12.53.02C13.84 0 15.14.01 16.44 0c.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.03 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.81.33-.85.51-1.44 1.42-1.58 2.39-.16 1.03.16 2.12.86 2.89.65.73 1.59 1.12 2.57 1.1 1.18-.02 2.31-.73 2.88-1.76.33-.55.5-1.18.49-1.82.01-4.14.01-8.28.01-12.41z"/></svg>
            </div>
        </div>
    </div>

    <div style="text-align:center; font-weight:bold; margin: 20px 0;">مرحباً بك في Noure Store</div>

    <div class="action-grid">
        <div class="main-card btn-tiktok" onclick="openPage('tkPage')">
            <span style="font-size:30px;">🪙</span>
            <b>شحن TikTok</b>
        </div>

        <div class="main-card btn-orange" onclick="openPage('mkPage')">
            <span style="font-size:30px;">🏠</span>
            <b>العقارات والسيارات</b>
        </div>

        <div class="main-card btn-navy" onclick="openPage('mkPage')">
            <span style="font-size:30px;">📱</span>
            <b>الإلكترونيات</b>
        </div>

        <div class="main-card btn-gold" onclick="openPage('authPage')">
            <span style="font-size:30px;">🔑</span>
            <b>إنشاء حساب</b>
        </div>

        <div class="main-card btn-green" onclick="openPage('addPage')">
            <span style="font-size:30px;">➕</span>
            <b>نشر إعلان</b>
        </div>

        <div class="main-card btn-navy" onclick="alert('قريباً...')">
            <span style="font-size:30px;">📊</span>
            <b>حاسبة الشركاء</b>
        </div>
    </div>
</div>

<div id="authPage" class="page-content">
    <button onclick="closePage('authPage')" style="color:red; border:none; background:none;">❌ رجوع</button>
    <h2 style="text-align:center;">انضم لـ Noure Store 🔑</h2>
    <input type="text" placeholder="الاسم الكامل">
    <input type="email" placeholder="البريد الإلكتروني">
    <input type="password" placeholder="كلمة المرور">
    <button class="btn-action">إنشاء الحساب الآن</button>
</div>

<div id="tkPage" class="page-content">
    <button onclick="closePage('tkPage')" style="color:red; border:none; background:none;">❌ رجوع</button>
    <h2 style="text-align:center;">شحن عملات تيك توك 🪙</h2>
    <input type="text" id="tkID" placeholder="ID الحساب (@username)">
    <select id="tkPack">
        <option value="100 عملة - 10 AED">100 عملة (10 AED)</option>
        <option value="500 عملة - 45 AED">500 عملة (45 AED)</option>
        <option value="1000 عملة - 85 AED">1000 عملة (85 AED)</option>
    </select>
    <button class="btn-action" onclick="sendTikTok()" style="background:#000;">اطلب عبر واتساب 💬</button>
</div>

<div id="mkPage" class="page-content">
    <button onclick="closePage('mkPage')" style="font-weight:bold; border:none; background:none;">⬅️ العودة للرئيسية</button>
    <h3 style="text-align:center;">المعروضات (عقارات، سيارات، أجهزة)</h3>
    <div class="product-grid" id="marketDisplay"></div>
</div>

<div id="addPage" class="page-content">
    <button onclick="closePage('addPage')" style="color:red; border:none; background:none;">❌ إلغاء</button>
    <h2 style="text-align:center;">نشر إعلان جديد 🚀</h2>
    <input type="text" id="tit" placeholder="عنوان الإعلان">
    <select id="cat">
        <option value="عقارات">🏙️ عقارات</option>
        <option value="سيارات">🚗 سيارات</option>
        <option value="إلكترونيات">📱 إلكترونيات</option>
    </select>
    <input type="number" id="pri" placeholder="السعر (AED)">
    <input type="text" id="wat" placeholder="رقم واتسابك">
    <input type="file" id="img" accept="image/*">
    <button class="btn-action" onclick="saveProduct()">تأكيد النشر ✅</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ff0ku07M5FT8O4PVxBL0fkb70h8OaFY",
        authDomain: "nour-store-platform.firebaseapp.com",
        projectId: "nour-store-platform",
        storageBucket: "nour-store-platform.appspot.com",
        messagingSenderId: "1058922024981",
        appId: "1:1058922024981:web:8317653906d138ec8bfe1c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function openPage(id) { document.getElementById(id).style.display = 'block'; }
    function closePage(id) { document.getElementById(id).style.display = 'none'; }

    async function saveProduct() {
        const title=document.getElementById('tit').value, file=document.getElementById('img').files[0];
        if(!title || !file) return alert("يرجى إكمال البيانات");
        const r = new FileReader(); r.readAsDataURL(file);
        r.onload = async () => {
            await db.collection("diverse_market").add({
                title, cat:document.getElementById('cat').value, price: Number(document.getElementById('pri').value),
                wa:document.getElementById('wat').value, img: r.result, time: Date.now()
            });
            alert("تم النشر في Noure Store بنجاح!"); location.reload();
        };
    }

    db.collection("diverse_market").orderBy("time", "desc").onSnapshot(s => {
        let h = "";
        s.forEach(d => {
            const i = d.data();
            h += `<div class="p-card">
                <img src="${i.img}" class="p-img">
                <div style="padding:8px;">
                    <span style="font-size:9px; color:var(--bg-green); font-weight:bold;">${i.cat}</span>
                    <div style="font-weight:bold; font-size:12px;">${i.title}</div>
                    <div style="color:green; font-weight:bold; font-size:14px;">${i.price} AED</div>
                    <a href="https://wa.me/${i.wa}" style="text-decoration:none; font-size:10px; color:blue;">💬 اطلب الآن</a>
                </div>
            </div>`;
        });
        document.getElementById('marketDisplay').innerHTML = h || "جاري جلب البيانات...";
    });

    function sendTikTok() {
        const id = document.getElementById('tkID').value;
        const pack = document.getElementById('tkPack').value;
        window.location.href = `https://wa.me/971500000000?text=طلب_شحن_تيك_توك_NoureStore:%0AID:${id}%0APack:${pack}`;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nore Store | نوري ستور</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --gold: #D4AF37; --dark-bg: #0a0e1a; --card-gray: #1e293b; --green: #22c55e; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--dark-bg); color: #fff; direction: rtl; padding-bottom: 120px; }
        
        /* القائمة العلوية الجديدة */
        .top-nav { display: flex; justify-content: center; gap: 20px; padding: 10px; background: #000; border-bottom: 1px solid #333; font-size: 14px; }
        .top-nav span { cursor: pointer; color: var(--gold); }

        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); background: #000; }
        .my-logo { width: 100px; height: auto; margin-bottom: 10px; }
        .logo-n { font-size: 32px; color: var(--gold); font-family: serif; margin: 0; }

        .container { width: 92%; max-width: 550px; margin: 20px auto; }

        /* الأقسام */
        .section-card { border-radius: 15px; margin-bottom: 12px; cursor: pointer; padding: 20px; font-weight: bold; font-size: 18px; text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .c1 { background: #1a4731; } .c2 { background: #1e3a8a; } .c3 { background: #4c1d95; }
        .c4 { background: #701a1a; } .c5 { background: #ea580c; } .c6 { background: #4b5563; }

        .auth-box { background: var(--card-gray); padding: 25px; border-radius: 20px; border: 2px solid var(--gold); text-align: center; margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; background: #0a0e1a; border: 1px solid #334155; color: #fff; box-sizing: border-box; text-align: center; }
        
        .btn-submit { background: var(--gold); color: #000; padding: 16px; width: 100%; border-radius: 30px; font-weight: bold; border: none; cursor: pointer; font-size: 17px; }

        /* شاشة "حولنا" و "تواصل معنا" */
        .overlay-box { display: none; background: rgba(0,0,0,0.9); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; padding: 40px 20px; box-sizing: border-box; text-align: center; }

        /* البار السفلي */
        #navBar { display: flex; justify-content: space-around; align-items: center; background: #000; padding: 10px 0; position: fixed; bottom: 0; width: 100%; border-top: 2px solid var(--gold); z-index: 999; }
        .nav-btn { background: none; color: white; border: none; cursor: pointer; font-size: 13px; }
        .post-btn-large { background: var(--gold) !important; color: #000 !important; padding: 12px 25px !important; border-radius: 25px !important; font-size: 16px !important; font-weight: bold !important; }
    </style>
</head>
<body>

<div class="top-nav">
    <span onclick="showOverlay('about')">حولنا</span>
    <span onclick="showOverlay('contact')">تواصل معنا</span>
</div>

<header>
    <img src="https://raw.githubusercontent.com/SoOo/NoreStore/main/logo.png" alt="Logo" class="my-logo" onerror="this.src='https://i.ibb.co/vzYh0B5/nore-logo.png'">
    <h1 class="logo-n">Nore Store</h1>
</header>

<div id="aboutOverlay" class="overlay-box">
    <h2>حول نوري ستور</h2>
    <p>نوري ستور هو منصتكم الموثوقة لبيع وشراء المنتجات والخدمات بسهولة وأمان في السودان.</p>
    <button class="btn-submit" onclick="closeOverlay()">إغلاق</button>
</div>

<div id="contactOverlay" class="overlay-box">
    <h2>تواصل معنا</h2>
    <p>لأي استفسار أو دعم فني، راسلنا عبر البريد:</p>
    <h3 style="color:var(--gold)">nurry6666@gmail.com</h3>
    <button class="btn-submit" onclick="closeOverlay()">إغلاق</button>
</div>

<div class="container">
    <div id="homeView">
        <div class="section-card c1" onclick="toggleSec('cars')">سيارات للبيع 🚗</div>
        <div class="section-card c2" onclick="toggleSec('houses')">عقارات وأراضي 🏠</div>
        <div class="section-card c3" onclick="toggleSec('tech')">جوالات وإلكترونيات 📱</div>

        <div id="authArea" class="auth-box">
            <div id="authContent">
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button onclick="toggleAuth(true)" id="tabSignup" style="flex:1; padding:10px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">تسجيل جديد</button>
                    <button onclick="toggleAuth(false)" id="tabLogin" style="flex:1; padding:10px; background:#0a0e1a; color:#fff; border:none; border-radius:8px;">دخول</button>
                </div>
                <div id="nameInput"><input type="text" id="uName" placeholder="الاسم الكامل"></div>
                <input type="email" id="uEmail" placeholder="البريد الإلكتروني">
                <input type="password" id="uPass" placeholder="كلمة المرور">
                <button class="btn-submit" onclick="handleAuth()" id="authBtn">بدء الاستخدام 🚀</button>
            </div>
        </div>
    </div>

    <div id="postView" style="display:none;" class="auth-box">
        <div id="successArea"></div>
        <h3 style="color:var(--gold);">نشر إعلان جديد</h3>
        <input type="text" id="pTitle" placeholder="عنوان الإعلان">
        <textarea id="pDesc" placeholder="التفاصيل..."></textarea>
        <input type="number" id="pPrice" placeholder="السعر">
        <input type="tel" id="pPhone" placeholder="رقم التواصل">
        <select id="pCat">
            <option value="cars">سيارات</option><option value="houses">عقارات</option><option value="tech">تقنية</option>
        </select>
        <input type="file" id="pFile">
        <button class="btn-submit" onclick="uploadAd()" id="upBtn">نشر الإعلان الآن ✅</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #444;">
        <button onclick="auth.signOut(); location.reload();" style="background:none; color:#ff4444; border:none; cursor:pointer; font-weight:bold;">تسجيل الخروج 🚪</button>
    </div>
</div>

<div id="navBar">
    <button class="nav-btn" onclick="showView('home')">🏠 الرئيسية</button>
    <button class="nav-btn post-btn-large" onclick="showView('post')">➕ انشر إعلانك</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCGHZnuS8OrzZwFVhhZ55nGbf0yGKw8lUA", authDomain: "norestore-d1f0d.firebaseapp.com", projectId: "norestore-d1f0d", databaseURL: "https://norestore-d1f0d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let isSignup = true;

    auth.onAuthStateChanged(user => {
        if(user) { document.getElementById('authArea').style.display = 'none'; }
    });

    function toggleAuth(s) {
        isSignup = s;
        document.getElementById('nameInput').style.display = s ? 'block' : 'none';
        document.getElementById('authBtn').innerText = s ? "إنشاء الحساب 🚀" : "دخول 🔑";
        document.getElementById('tabSignup').style.background = s ? 'var(--gold)' : '#0a0e1a';
        document.getElementById('tabLogin').style.background = s ? '#0a0e1a' : 'var(--gold)';
    }

    function handleAuth() {
        const e = document.getElementById('uEmail').value, p = document.getElementById('uPass').value;
        if(isSignup) {
            auth.createUserWithEmailAndPassword(e, p).then(() => {
                document.getElementById('authContent').innerHTML = `
                    <div style="padding:10px;">
                        <b style="color:var(--green)">✅ تم إنشاء الحساب بنجاح!</b><br><br>
                        <button class="btn-submit" onclick="toggleAuth(false)">الآن سجل دخولك من هنا 🔑</button>
                    </div>`;
            }).catch(a => alert(a.message));
        } else {
            auth.signInWithEmailAndPassword(e, p).then(() => {
                document.getElementById('postView').style.display = 'block';
                showView('post');
            }).catch(a => alert(a.message));
        }
    }

    async function uploadAd() {
        const file = document.getElementById('pFile').files[0];
        if(!file) return alert("اختر صورة");
        const btn = document.getElementById('upBtn'); btn.disabled = true; btn.innerText = "جاري النشر...";
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'ml_default');
        try {
            const res = await fetch('https://api.cloudinary.com/v1_1/dky9ovkhw/image/upload', {method:'POST', body:fd});
            const data = await res.json();
            await db.ref('ads').push({
                uid: auth.currentUser.uid, title: document.getElementById('pTitle').value,
                price: document.getElementById('pPrice').value, img: data.secure_url
            });
            document.getElementById('successArea').innerHTML = `<div style="background:var(--green); padding:10px; margin-bottom:10px; border-radius:10px;">تم النشر! <button onclick="location.reload()" style="background:#fff; border:none; padding:5px; border-radius:5px;">إعلان جديد +</button></div>`;
        } catch(e) { alert("خطأ في الاتصال"); }
        btn.disabled = false; btn.innerText = "نشر الإعلان الآن ✅";
    }

    function showView(v) {
        if(v === 'post' && !auth.currentUser) { alert("سجل دخولك أولاً!"); return; }
        document.getElementById('homeView').style.display = v === 'home' ? 'block' : 'none';
        document.getElementById('postView').style.display = v === 'post' ? 'block' : 'none';
    }

    function showOverlay(type) {
        document.getElementById(type === 'about' ? 'aboutOverlay' : 'contactOverlay').style.display = 'block';
    }
    function closeOverlay() {
        document.querySelectorAll('.overlay-box').forEach(el => el.style.display = 'none');
    }
</script>
</body>
</html>

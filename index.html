<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نُور العقارية | إضافة مباشرة</title>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f7f6; color: var(--dark); text-align: center; }
        header { background: var(--dark); color: var(--gold); padding: 25px; font-weight: bold; border-bottom: 4px solid var(--gold); font-size: 1.5em; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: right; }
        input, textarea, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1.5px solid #eee; box-sizing: border-box; font-size: 15px; font-family: inherit; }
        textarea { height: 100px; resize: none; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #555; }
        button { background: var(--dark); color: var(--gold); font-weight: bold; border: 1px solid var(--gold); cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--gold); color: var(--dark); }
        .prop-card { background: white; border-radius: 20px; overflow: hidden; margin: 25px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: right; border: 1px solid #eee; }
        .prop-media { width: 100%; max-height: 300px; object-fit: cover; background: #000; }
        .info { padding: 20px; }
        .price { color: #27ae60; font-size: 1.4em; font-weight: bold; display: block; margin: 10px 0; }
        .wa-btn { background: #25d366; color: white; border: none; padding: 12px; border-radius: 12px; text-decoration: none; display: block; text-align: center; font-weight: bold; margin-top: 15px; }
        .wa-btn:hover { background: #1ebe57; }
        .loader { color: var(--gold); font-weight: bold; display: none; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<header>نُور العقارية | NOUR REAL ESTATE 🏙️</header>

<div class="container">
    <div class="card">
        <h3 style="color:var(--gold); text-align:center;">إضافة عرض جديد 💎</h3>
        
        <input type="text" id="pTitle" placeholder="عنوان العقار">
        <textarea id="pDesc" placeholder="وصف العقار التفصيلي..."></textarea>
        <input type="number" id="pPrice" placeholder="السعر (AED)">
        <input type="text" id="pWhatsApp" placeholder="رقم الواتساب (مثال: 97150xxxxxxx)">

        <label>📸 اختر صورة العقار:</label>
        <input type="file" id="pImgFile" accept="image/*">
        
        <label>🎥 اختر فيديو العقار (اختياري):</label>
        <input type="file" id="pVidFile" accept="video/*">

        <div id="status" class="loader">جاري النشر... يرجى الانتظار ⏳</div>
        <button id="addBtn" onclick="handleUpload()">نشر العرض المطور الآن ✅</button>
    </div>

    <div id="propList">جاري تحميل العروض...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ff0ku07M5FT8O4PVxBL0fkb70h8OaFY",
        authDomain: "nour-store-platform.firebaseapp.com",
        projectId: "nour-store-platform",
        storageBucket: "nour-store-platform.appspot.com",
        messagingSenderId: "1058922024981",
        appId: "1:1058922024981:web:8317653906d138ec8bfe1c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function handleUpload() {
        const title = document.getElementById('pTitle').value;
        const desc = document.getElementById('pDesc').value;
        const price = document.getElementById('pPrice').value;
        const wa = document.getElementById('pWhatsApp').value;
        const imgFile = document.getElementById('pImgFile').files[0];

        if(!title || !price || !wa || !imgFile) {
            alert("يرجى ملء البيانات واختيار صورة على الأقل");
            return;
        }

        document.getElementById('status').style.display = 'block';
        document.getElementById('addBtn').disabled = true;

        // ملاحظة: بما أن Storage يتطلب ترقية، سنستخدم قارئ الملفات لعرض الصور محلياً كحل بديل وسريع
        const reader = new FileReader();
        reader.readAsDataURL(imgFile);
        reader.onload = async () => {
            const imgData = reader.result;
            
            await db.collection("smart_listings").add({
                title, desc, price, wa, imgData,
                createdAt: Date.now()
            });

            alert("تم نشر العرض بنجاح!");
            location.reload();
        };
    }

    db.collection("smart_listings").orderBy("createdAt", "desc").onSnapshot(snap => {
        let h = "";
        snap.forEach(doc => {
            const p = doc.data();
            h += `
                <div class="prop-card">
                    <img src="${p.imgData}" class="prop-media">
                    <div class="info">
                        <h3 style="margin:0;">${p.title}</h3>
                        <p style="color:#666; font-size:0.9em;">${p.desc}</p>
                        <span class="price">${Number(p.price).toLocaleString()} AED</span>
                        <a href="https://wa.me/${p.wa}?text=استفسار_عن_${p.title}" class="wa-btn">تواصل عبر واتساب ✅</a>
                    </div>
                </div>`;
        });
        document.getElementById('propList').innerHTML = h || "لا توجد عروض حالياً";
    });
</script>
</body>
</html>

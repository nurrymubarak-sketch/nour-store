<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر نوري | Noure Store</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #D4AF37, #F9F295, #B8860B);
            --dark-bg: #0d1117;
            --card-gray: #161b22;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background: var(--dark-bg); color: #fff; text-align: center;
        }

        header {
            background: linear-gradient(to bottom, #16213e, #0f3460);
            padding: 30px 0; border-bottom: 3px solid #D4AF37;
        }
        .logo-box {
            border: 2px solid #D4AF37; display: inline-block;
            padding: 15px 30px; border-radius: 15px; background: #000;
        }
        .logo-n {
            font-size: 60px; background: var(--gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: serif; margin: 0; line-height: 1;
        }

        .container { width: 92%; margin: 25px auto; padding-bottom: 80px; }
        .card {
            background: var(--card-gray); border-radius: 20px; margin-bottom: 25px;
            overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.3); text-align: right;
        }
        .bg-tk { background: linear-gradient(90deg, #ff0050, #00f2ea); }

        .card-inner { padding: 20px; display: flex; gap: 15px; align-items: center; }
        .card-img { width: 130px; height: 95px; border-radius: 12px; object-fit: cover; border: 1.5px solid #D4AF37; }
        
        .btn-gold {
            background: var(--gold); color: #000; border: none; padding: 12px 25px;
            border-radius: 25px; font-weight: bold; cursor: pointer;
        }

        /* الصفحات المنبثقة */
        .page { 
            display: none; position: fixed; inset: 0; background: #0d1117; 
            z-index: 9999; padding: 25px; overflow-y: auto; text-align: right; 
        }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        label { display: block; margin-top: 20px; color: #D4AF37; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1 class="logo-n">N</h1>
        <div style="color:#D4AF37; font-weight:bold;">متجر نوري</div>
    </div>
</header>

<div class="container">
    <button class="btn-gold" style="width:100%; padding:20px; margin-bottom:25px;" onclick="openPage('regPage')">🔑 إنشاء حساب معلن جديد</button>

    <div class="card">
        <div class="card-head bg-tk" style="padding:10px 15px; font-weight:bold;">🪙 شحن عملات تيك توك</div>
        <div class="card-inner">
            <img src="https://files.catbox.moe/p9o4b6.png" class="card-img" alt="شعار تيك توك">
            <div style="flex:1">
                <h3 style="margin:0; color:#D4AF37">شحن فوري وآمن</h3>
                <button class="btn-gold" onclick="alert('تواصل مع الإدارة للشحن')">اشحن الآن</button>
            </div>
        </div>
    </div>
</div>

<div id="regPage" class="page">
    <h2 style="color:#D4AF37; text-align:center;">إنشاء حساب جديد 🔑</h2>
    
    <label>الاسم الكامل</label>
    <input type="text" id="userName" placeholder="أدخل اسمك">

    <label>البريد الإلكتروني (لتلقي رسالة التأكيد)</label>
    <input type="email" id="userEmail" placeholder="example@mail.com">
    
    <label>رقم الواتساب</label>
    <input type="tel" placeholder="+249...">

    <button class="btn-gold" style="width:100%; margin-top:25px; padding:18px;" onclick="handleRegistration()">تأكيد وإنشاء الحساب</button>
    
    <p style="text-align:center; margin-top:40px; color:#666; font-size:14px;">يمكنك الرجوع عبر سهم المتصفح في الأسفل</p>
</div>

<script>
    // فتح الصفحة وإضافة سجل للتاريخ
    function openPage(id) {
        document.getElementById(id).style.display = 'block';
        window.history.pushState({pageId: id}, "", "#" + id);
    }

    // إغلاق الصفحات عند الرجوع بالسهم
    window.onpopstate = function(event) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    };

    // معالجة التسجيل وإرسال رسالة التأكيد
    function handleRegistration() {
        const email = document.getElementById('userEmail').value;
        const name = document.getElementById('userName').value;

        if(!email || !name) {
            alert("يرجى ملء جميع الخانات المطلوبة.");
            return;
        }

        alert("✅ شكراً " + name + "!\n\nلقد تم إرسال رسالة تأكيد إلى البريد: (" + email + "). يرجى مراجعة بريدك لتفعيل الحساب.");
    }
</script>

</body>
</html>

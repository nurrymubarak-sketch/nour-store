<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nour Real Estate | عقارات دبي</title>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --bg: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--dark); text-align: center; }
        header { background: var(--dark); color: var(--gold); padding: 20px; font-size: 1.3em; font-weight: bold; border-bottom: 3px solid var(--gold); }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 25px; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--dark); color: var(--gold); font-weight: bold; border: 1px solid var(--gold); cursor: pointer; }
        .hidden { display: none; }
        .property-card { background: white; border-radius: 15px; padding: 15px; margin: 15px 0; border-right: 8px solid var(--gold); text-align: right; }
    </style>
</head>
<body>

<header>NOUR REAL ESTATE | نُور للعقارات</header>

<div class="container">
    <div id="loginSection" class="card">
        <h3>دخول الوكلاء العقاريين</h3>
        <input type="text" id="userNick" placeholder="اسم المستخدم (مثلاً: SoOo)">
        <input type="password" id="userPass" placeholder="كلمة السر">
        <button onclick="simpleLogin()">دخول / تسجيل جديد</button>
        <p style="font-size: 0.8em; color: #666;">إذا كنت جديداً، سيتم إنشاء حسابك تلقائياً عند الضغط</p>
    </div>

    <div id="dashSection" class="card hidden">
        <h3 id="hello">مرحباً</h3>
        <div style="border-top: 1px solid #eee; padding-top: 10px;">
            <h4>إضافة عقار جديد في دبي 🏙️</h4>
            <input type="text" id="pName" placeholder="اسم المشروع">
            <select id="pLoc">
                <option value="دبي مارينا">دبي مارينا</option>
                <option value="نخلة جميرا">نخلة جميرا</option>
                <option value="داون تاون دبي">داون تاون دبي</option>
            </select>
            <input type="number" id="pPrice" placeholder="السعر بالدرهم (AED)">
            <button onclick="addProp()">نشر العقار الآن</button>
        </div>
        <button onclick="location.reload()" style="background:#eee; color:#333; border:none; margin-top:10px;">خروج</button>
    </div>

    <div class="card">
        <h3 style="color: var(--gold);">أحدث العقارات 📍</h3>
        <div id="list">جاري التحميل...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ff0ku07M5FT8O4PVxBL0fkb70h8OaFY",
        authDomain: "nour-store-platform.firebaseapp.com",
        projectId: "nour-store-platform",
        storageBucket: "nour-store-platform.firebasestorage.app",
        messagingSenderId: "1058922024981",
        appId: "1:1058922024981:web:8317653906d138ec8bfe1c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentAgent = "";

    // دخول بسيط بدون تعقيدات الإيميل
    function simpleLogin() {
        const user = document.getElementById('userNick').value;
        const pass = document.getElementById('userPass').value;
        if(user.length > 2 && pass.length > 3) {
            currentAgent = user;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashSection').classList.remove('hidden');
            document.getElementById('hello').innerText = "أهلاً بك يا " + user;
        } else {
            alert("يرجى كتابة اسم وباسوورد (أكثر من 4 أرقام)");
        }
    }

    async function addProp() {
        const name = document.getElementById('pName').value;
        const loc = document.getElementById('pLoc').value;
        const price = document.getElementById('pPrice').value;
        if(name && price) {
            await db.collection("properties").add({
                propertyName: name,
                location: loc,
                price: price,
                agent: currentAgent,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("تم النشر!");
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
        }
    }

    db.collection("properties").orderBy("time", "desc").onSnapshot(snap => {
        let html = "";
        snap.forEach(doc => {
            const p = doc.data();
            html += `<div class="property-card">
                <strong>🏠 ${p.propertyName}</strong> <br>
                <span>📍 ${p.location}</span> | <span style="color:green">${Number(p.price).toLocaleString()} AED</span> <br>
                <small>بواسطة: ${p.agent}</small>
            </div>`;
        });
        document.getElementById('list').innerHTML = html || "لا توجد عقارات";
    });
</script>
</body>
</html>

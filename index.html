<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nore Store | متجر نوري</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #D4AF37, #F9F295, #B8860B);
            --dark-bg: #0d1117;
            --card-gray: #161b22;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; background: var(--dark-bg); color: #fff; text-align: center;
        }
        header {
            background: linear-gradient(to bottom, #16213e, #0f3460);
            padding: 20px 0; border-bottom: 3px solid #D4AF37;
        }
        .logo-box {
            border: 2px solid #D4AF37; display: inline-block;
            padding: 10px 25px; border-radius: 15px; background: #000; margin-bottom: 10px;
        }
        .logo-n {
            font-size: 50px; background: var(--gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: serif; margin: 0; line-height: 1;
        }
        
        .search-container { width: 90%; margin: 10px auto; }
        .search-bar {
            width: 100%; padding: 12px; border-radius: 25px; border: 1px solid #D4AF37;
            background: #1a1a1a; color: #fff; text-align: center; outline: none;
        }

        .container { width: 92%; margin: 20px auto; padding-bottom: 80px; }
        
        .card {
            background: var(--card-gray); border-radius: 20px; margin-bottom: 25px;
            overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.3); text-align: right;
        }
        .card-head { padding: 12px 15px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 10px; }
        
        /* ألوان الأقسام الستة */
        .bg-car { background: #064e3b; }
        .bg-house { background: #1e3a8a; }
        .bg-serv { background: #431407; }
        .bg-phone { background: #581c87; }
        .bg-furn { background: #78350f; }
        .bg-job { background: #164e63; }

        .card-inner { padding: 15px; display: flex; gap: 15px; align-items: center; }
        .card-img-box { width: 130px; height: 100px; border-radius: 12px; border: 1.5px solid #D4AF37; overflow: hidden; flex-shrink: 0; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-gold {
            background: var(--gold); color: #000; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1 class="logo-n">N</h1>
        <div style="color:#D4AF37; font-weight:bold;">Nore Store</div>
    </div>
    <div class="search-container">
        <input type="text" id="mainSearch" class="search-bar" placeholder="🔍 ابحث عن ما تحتاجه..." onkeyup="doSearch()">
    </div>
</header>

<div class="container" id="allAds">
    
    <div class="card ad-box">
        <div class="card-head bg-car">🚗 سيارات مستعملة</div>
        <div class="card-inner">
            <div class="card-img-box"><img src="https://images.unsplash.com/photo-1550355291-bbee04a92027?q=80&w=300"></div>
            <div style="flex:1">
                <h3 style="margin:0; color:#D4AF37; font-size: 16px;">سوق السيارات</h3>
                <button class="btn-gold">تصفح</button>
            </div>
        </div>
    </div>

    <div class="card ad-box">
        <div class="card-head bg-house">🏠 عقارات (إيجار)</div>
        <div class="card-inner">
            <div class="card-img-box"><img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=300"></div>
            <div style="flex:1">
                <h3 style="margin:0; color:#D4AF37; font-size: 16px;">شقق وبيوت</h3>
                <button class="btn-gold">شاهد الصور</button>
            </div>
        </div>
    </div>

    <div class="card ad-box">
        <div class="card-head bg-serv">🛠️✨ صيانة ونظافة</div>
        <div class="card-inner">
            <div class="card-img-box"><img src="https://images.unsplash.com/photo-1621905235294-75416075e840?q=80&w=300"></div>
            <div style="flex:1">
                <h3 style="margin:0; color:#D4AF37; font-size: 16px;">صيانة شاملة</h3>
                <button class="btn-gold">اطلب الآن</button>
            </div>
        </div>
    </div>

    <div class="card ad-box">
        <div class="card-head bg-phone">📱 جوالات وإلكترونيات</div>
        <div class="card-inner">
            <div class="card-img-box"><img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=300"></div>
            <div style="flex:1">
                <h3 style="margin:0; color:#D4AF37; font-size: 16px;">أحدث الموديلات</h3>
                <button class="btn-gold">تصفح</button>
            </div>
        </div>
    </div>

    <div class="card ad-box">
        <div class="card-head bg-furn">🛋️ أثاث مستعمل</div>
        <div class="card-inner">
            <div class="card-img-box"><img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?q=80&w=300"></div>
            <div style="flex:1">
                <h3 style="margin:0; color:#D4AF37; font-size: 16px;">سوق الأثاث</h3>
                <button class="btn-gold">عرض الكل</button>
            </div>
        </div>
    </div>

    <div class="card ad-box">
        <div class="card-head bg-job">💼 وظائف وطلبات عمل</div>
        <div class="card-inner">
            <div class="card-img-box"><img src="https://images.unsplash.com/photo-1521737711867-e3b97375f902?q=80&w=300"></div>
            <div style="flex:1">
                <h3 style="margin:0; color:#D4AF37; font-size: 16px;">فرص العمل</h3>
                <button class="btn-gold">شاهد الوظائف</button>
            </div>
        </div>
    </div>

</div>

<script>
    function doSearch() {
        let val = document.getElementById('mainSearch').value.toLowerCase();
        let ads = document.querySelectorAll('.ad-box');
        ads.forEach(ad => {
            ad.style.display = ad.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }
</script>

</body>
</html>

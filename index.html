<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nore Store | متجر نوري</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --gold: linear-gradient(135deg, #D4AF37, #F9F295, #B8860B);
            --dark-bg: #0d1117;
            --card-gray: #161b22;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--dark-bg); color: #fff; text-align: center; }
        header { background: linear-gradient(to bottom, #16213e, #0f3460); padding: 25px 0; border-bottom: 3px solid #D4AF37; }
        
        .logo-box { border: 2px solid #D4AF37; display: inline-block; padding: 10px 25px; border-radius: 15px; background: #000; margin-bottom: 5px; }
        .logo-n { font-size: 50px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: serif; margin: 0; line-height: 1; }
        
        .sub-logo { margin-top: 10px; }
        .sub-logo .ar { color: #D4AF37; font-size: 18px; font-weight: bold; display: block; }
        .sub-logo .en { color: #aaa; font-size: 11px; font-style: italic; display: block; margin-top: 4px; }

        .container { width: 92%; margin: 20px auto; padding-bottom: 50px; }
        .btn-portal { background: var(--gold); color: #000; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; border: none; margin-bottom: 30px; font-size: 16px; cursor: pointer; display: block; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        .card { background: var(--card-gray); border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.3); text-align: right; }
        .card-head { padding: 12px 15px; font-weight: bold; color: #fff; font-size: 14px; background: #064e3b; }
        
        .ad-list { background: #1a1a1a; padding: 10px; min-height: 20px; }
        .user-ad { display: flex; padding: 12px; border-bottom: 1px solid #333; gap: 12px; align-items: center; animation: fadeIn 0.5s; }
        .user-ad img { width: 85px; height: 85px; border-radius: 10px; object-fit: cover; border: 1.5px solid #D4AF37; }
        .user-ad div { flex: 1; }
        .user-ad strong { color: #D4AF37; font-size: 15px; display: block; margin-bottom: 4px; }
        .user-ad p { margin: 0; font-size: 13px; color: #ccc; line-height: 1.4; }

        .page { display: none; position: fixed; inset: 0; background: #0d1117; z-index: 9999; padding: 25px; overflow-y: auto; text-align: right; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        label { display: block; margin-top: 15px; color: #D4AF37; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1 class="logo-n">N</h1>
        <div style="color:#D4AF37; font-weight:bold;">Nore Store</div>
    </div>
    <div class="sub-logo">
        <span class="ar">عالمك للإعلان والخدمات الموثوقة</span>
        <span class="en">Your World for Advertising & Trusted Services</span>
    </div>
</header>

<div class="container">
    <button class="btn-portal" onclick="document.getElementById('regPage').style.display='block'">✨ انشر إعلانك ليراه الجميع الآن</button>

    <div class="card">
        <div class="card-head">🚗 سيارات للبيع</div>
        <div id="list-cars" class="ad-list"></div>
    </div>

    <div class="card">
        <div class="card-head" style="background:#1e3a8a;">🏠 بيوت للإيجار / للبيع</div>
        <div id="list-house" class="ad-list"></div>
    </div>

    <div class="card">
        <div class="card-head" style="background:#581c87;">📱 جوالات وإلكترونيات</div>
        <div id="list-tech" class="ad-list"></div>
    </div>

    <div class="card">
        <div class="card-head" style="background:#431407;">🛠️ خدمات صيانة ونظافة</div>
        <div id="list-fix" class="ad-list"></div>
    </div>

    <div class="card">
        <div class="card-head" style="background:#065f46;">💼 وظائف شاغرة</div>
        <div id="list-jobs" class="ad-list"></div>
    </div>

    <div class="card">
        <div class="card-head" style="background:#374151;">✨ مستلزمات ومنوعات أخرى</div>
        <div id="list-other" class="ad-list"></div>
    </div>
</div>

<div id="regPage" class="page">
    <h2 style="color:#D4AF37; text-align:center;">نشر إعلان جديد 🚀</h2>
    
    <label>الاسم</label>
    <input type="text" id="uName" placeholder="أدخل اسمك">
    
    <label>القسم</label>
    <select id="uType">
        <option value="cars">سيارات للبيع</option>
        <option value="house">بيوت للإيجار / للبيع</option>
        <option value="tech">جوالات وإلكترونيات</option>
        <option value="fix">خدمات صيانة ونظافة</option>
        <option value="jobs">وظائف شاغرة</option>
        <option value="other">مستلزمات ومنوعات أخرى</option>
    </select>
    
    <label>رابط صورة الإعلان</label>
    <input type="text" id="uImg" placeholder="انسخ رابط الصورة وضعه هنا">
    
    <label>وصف الإعلان</label>
    <textarea id="uDesc" rows="4" placeholder="اكتب تفاصيل إعلانك..."></textarea>
    
    <button class="btn-portal" style="margin-top:20px;" onclick="publishAd()">انشر الآن</button>
    <button onclick="document.getElementById('regPage').style.display='none'" style="background:none; border:none; color:#666; width:100%; margin-top:20px;">إلغاء</button>
</div>

<script>
    // إعدادات SoOo الخاصة
    const firebaseConfig = {
      apiKey: "AIzaSyC-MoihmZLENUbWi1oo0aODvsbPvWVEN-U",
      authDomain: "norestore-efa4e.firebaseapp.com",
      projectId: "norestore-efa4e",
      databaseURL: "https://norestore-efa4e-default-rtdb.firebaseio.com", // رابط القاعدة المباشر
      appId: "1:501643206128:web:b26650c9f9324fb9d35135"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب الإعلانات وتوزيعها على الأقسام الستة
    db.ref('ads').on('value', (snapshot) => {
        const sections = ['cars', 'house', 'tech', 'fix', 'jobs', 'other'];
        sections.forEach(s => document.getElementById('list-'+s).innerHTML = "");

        snapshot.forEach((child) => {
            let ad = child.val();
            let html = `
                <div class="user-ad">
                    <img src="${ad.img || 'https://via.placeholder.com/85'}">
                    <div>
                        <strong>${ad.name}</strong>
                        <p>${ad.desc}</p>
                    </div>
                </div>`;
            
            let target = document.getElementById('list-' + ad.type);
            if(target) target.innerHTML += html;
        });
    });

    // دالة النشر في السيرفر
    function publishAd() {
        let name = document.getElementById('uName').value;
        let type = document.getElementById('uType').value;
        let img = document.getElementById('uImg').value;
        let desc = document.getElementById('uDesc').value;

        if(name && desc) {
            db.ref('ads').push({ name, type, img, desc });
            alert('تم النشر بنجاح على متجر نوري!');
            document.getElementById('regPage').style.display = 'none';
        } else {
            alert('أكمل البيانات أولاً');
        }
    }
</script>
</body>
</html>

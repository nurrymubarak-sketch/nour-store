<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noure Store | الإمبراطورية الشاملة</title>
    <style>
        :root { 
            --gold: #D4AF37; --dark-navy: #0d1726; --bg-green: #407b6e; 
            --bg-orange: #f48a73; --card-dark: #122338; --tiktok: linear-gradient(45deg, #000, #ff0050, #00f2ea);
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; color: #1e293b; overflow-x: hidden; }
        
        /* الهيدر وشريط العملات */
        header { background: var(--dark-navy); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .currency-bar { background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); border-radius: 50px; padding: 8px; display: flex; justify-content: center; gap: 15px; font-size: 11px; color: white; margin: 15px auto; width: 85%; }

        /* بانر الإمبراطورية واللوقو */
        .hero-banner { width: 100%; padding: 40px 0; background: linear-gradient(to bottom, var(--bg-green) 50%, var(--bg-orange) 50%); display: flex; flex-direction: column; align-items: center; }
        .logo-circle { width: 150px; height: 150px; background: white; border-radius: 50%; border: 4px solid var(--bg-green); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .logo-circle h1 { color: var(--bg-green); margin: 0; font-size: 50px; }

        /* شبكة الأزرار الرئيسية */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 92%; margin: 20px auto; }
        .main-card { border-radius: 15px; padding: 20px 10px; color: white; text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; border: none; }
        .main-card:active { transform: scale(0.95); }
        .btn-tiktok { background: var(--tiktok); }
        .btn-orange { background: var(--bg-orange); }
        .btn-green { background: #2d4c3b; }
        .btn-navy { background: var(--card-dark); }

        /* أقسام المحتوى (تكون مخفية وتظهر عند الطلب) */
        .page-content { display: none; padding: 15px; background: #fff; min-height: 100vh; position: fixed; inset: 0; z-index: 2000; overflow-y: auto; text-align: right; }
        
        /* تصميم كروت المنتجات في السوق */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .p-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .p-img { width: 100%; height: 130px; object-fit: cover; }
        .p-info { padding: 10px; }
        .p-price { color: #059669; font-weight: bold; display: block; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; background: #f9f9f9; font-family: inherit; }
    </style>
</head>
<body>

<header>
    <div onclick="location.reload()">☰</div>
    <div style="font-weight:bold; color:var(--gold);">Noure Store</div>
    <div>🌙</div>
</header>

<div id="homeUI">
    <div class="hero-banner">
        <div class="currency-bar">
            <span>🇸🇦 SAR</span><span>🇺🇸 USD</span><span>🇸🇩 SDG</span><span>🇦🇪 AED</span>
        </div>
        <div class="logo-circle">
            <h1>N</h1>
            <div style="font-weight:bold; color:#333;">Nour Store</div>
        </div>
    </div>

    <div style="text-align:center; font-weight:bold; margin: 20px 0;">مرحباً بك في إمبراطورية Noure Store الشاملة</div>

    <div class="action-grid">
        <div class="main-card btn-tiktok" onclick="openPage('tiktokPage')">
            <span style="font-size:30px;">🪙</span>
            <b>شحن TikTok</b>
        </div>
        <div class="main-card btn-orange" onclick="openPage('marketPage')">
            <span style="font-size:30px;">🏠</span>
            <b>سوق العقارات والسيارات</b>
        </div>
        <div class="main-card btn-green" onclick="openPage('addPage')">
            <span style="font-size:30px;">➕</span>
            <b>أضف إعلانك</b>
        </div>
        <div class="main-card btn-navy" onclick="alert('قريباً...')">
            <span style="font-size:30px;">📊</span>
            <b>حاسبة الشركاء 15%</b>
        </div>
    </div>
</div>

<div id="tiktokPage" class="page-content">
    <button onclick="closePage('tiktokPage')" style="color:red; border:none; background:none; font-weight:bold;">❌ إغلاق</button>
    <h2 style="text-align:center;">شحن عملات تيك توك 🪙</h2>
    <input type="text" id="tkID" placeholder="ادخل الآيدي (@username)">
    <select id="tkPack">
        <option value="100 عملة - 10 AED">100 عملة (10 AED)</option>
        <option value="500 عملة - 45 AED">500 عملة (45 AED)</option>
        <option value="1000 عملة - 85 AED">1000 عملة (85 AED)</option>
    </select>
    <button onclick="sendTikTok()" style="background:#000; color:#fff; padding:15px; width:100%; border-radius:10px; border:none; font-weight:bold;">اطلب الآن عبر واتساب 💬</button>
</div>

<div id="marketPage" class="page-content">
    <button onclick="closePage('marketPage')" style="font-weight:bold; border:none; background:none;">⬅️ رجوع</button>
    <h3 style="text-align:center;">المعروضات الحالية</h3>
    <div class="product-grid" id="marketDisplay"></div>
</div>

<div id="addPage" class="page-content">
    <button onclick="closePage('addPage')" style="color:red; border:none; background:none; font-weight:bold;">❌ إلغاء</button>
    <h2 style="text-align:center;">نشر إعلان جديد 🚀</h2>
    <input type="text" id="tit" placeholder="عنوان الإعلان">
    <select id="cat">
        <option value="عقارات">🏙️ عقارات</option>
        <option value="سيارات">🚗 سيارات</option>
        <option value="إلكترونيات">📱 إلكترونيات</option>
    </select>
    <input type="number" id="pri" placeholder="السعر (AED)">
    <input type="text" id="wat" placeholder="رقم الواتساب">
    <input type="file" id="img" accept="image/*">
    <button onclick="saveProduct()" style="background:var(--dark-navy); color:white; padding:15px; width:100%; border-radius:10px; border:none; font-weight:bold;">نشر الإعلان ✅</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ff0ku07M5FT8O4PVxBL0fkb70h8OaFY",
        authDomain: "nour-store-platform.firebaseapp.com",
        projectId: "nour-store-platform",
        storageBucket: "nour-store-platform.appspot.com",
        messagingSenderId: "1058922024981",
        appId: "1:1058922024981:web:8317653906d138ec8bfe1c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function openPage(id) { document.getElementById(id).style.display = 'block'; }
    function closePage(id) { document.getElementById(id).style.display = 'none'; }

    async function saveProduct() {
        const title=document.getElementById('tit').value, file=document.getElementById('img').files[0];
        if(!title || !file) return alert("أكمل البيانات");
        const r = new FileReader(); r.readAsDataURL(file);
        r.onload = async () => {
            await db.collection("diverse_market").add({
                title, cat:document.getElementById('cat').value, price: Number(document.getElementById('pri').value),
                wa:document.getElementById('wat').value, img: r.result, time: Date.now()
            });
            alert("تم النشر بنجاح!"); location.reload();
        };
    }

    db.collection("diverse_market").orderBy("time", "desc").onSnapshot(s => {
        let h = "";
        s.forEach(d => {
            const i = d.data();
            h += `<div class="p-card">
                <img src="${i.img}" class="p-img">
                <div class="p-info">
                    <span style="font-size:10px; color:gray;">${i.cat}</span>
                    <div style="font-weight:bold; font-size:13px;">${i.title}</div>
                    <span class="p-price">${i.price} AED</span>
                    <a href="https://wa.me/${i.wa}" style="color:green; font-size:11px; text-decoration:none;">💬 تواصل</a>
                </div>
            </div>`;
        });
        document.getElementById('marketDisplay').innerHTML = h || "لا توجد إعلانات حالياً";
    });

    function sendTikTok() {
        const id = document.getElementById('tkID').value;
        const pack = document.getElementById('tkPack').value;
        if(!id) return alert("يرجى إدخال الآيدي");
        window.location.href = `https://wa.me/971500000000?text=طلب_شحن_تيك_توك:%0Aالآيدي:${id}%0Aالباقة:${pack}`;
    }
</script>
</body>
</html>

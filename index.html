<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nore Store | متجر النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff0050; /* لون التيك توك الأحمر */
            --secondary-color: #00f2ea; /* لون التيك توك الأزرق */
            --bg-color: #000000;
            --card-bg: #121212;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #000000, #1a1a1a);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
        }

        .logo-area i {
            font-size: 4em;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        /* واجهة الخدمات الرئيسية */
        .main-services {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: -30px;
        }

        .service-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .service-box i {
            font-size: 2.5em;
            color: var(--secondary-color);
            margin-bottom: 10px;
            display: block;
        }

        .service-box:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
        }

        /* قسم الطلبات */
        .order-section {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            margin-top: 30px;
            border: 1px solid #222;
        }

        h2 { color: var(--primary-color); text-align: center; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }
        
        input, select, textarea {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: white;
            font-size: 1em;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: black;
            font-weight: bold;
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 10px;
        }

        /* زر الواتساب */
        .whatsapp-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 1000;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <i class="fas fa-bolt"></i>
        <h1 style="margin: 0; font-size: 2.5em;">NORE STORE</h1>
        <p style="color: #888;">خيارك الأفضل للخدمات الرقمية والعقارات</p>
    </div>
</header>

<div class="container">
    <div class="main-services">
        <div class="service-box">
            <i class="fab fa-tiktok"></i>
            <span>شحن تيك توك</span>
        </div>
        <div class="service-box">
            <i class="fas fa-bullhorn"></i>
            <span>إعلانات</span>
        </div>
        <div class="service-box">
            <i class="fas fa-car"></i>
            <span>سيارات</span>
        </div>
        <div class="service-box">
            <i class="fas fa-building"></i>
            <span>عقارات</span>
        </div>
    </div>

    <div class="order-section">
        <h2><i class="fas fa-shopping-basket"></i> اطلب الآن</h2>
        <form action="https://formspree.io/f/xdabranz" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="الاسم الكامل" required>
            </div>
            <div class="form-group">
                <select name="service">
                    <option value="Tiktok">شحن تيك توك</option>
                    <option value="Ads">إعلانات</option>
                    <option value="Cars">خدمات سيارات</option>
                    <option value="Real Estate">عقارات</option>
                </select>
            </div>
            <div class="form-group">
                <textarea name="message" rows="4" placeholder="اكتب تفاصيل طلبك هنا..." required></textarea>
            </div>
            <button type="submit">إرسال الطلب</button>
        </form>
    </div>
</div>

<a href="https://wa.me/971551505027" class="whatsapp-btn" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
